name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # The version-matrix job tests the newest upstream versions resolved at
    # run time — but push/PR triggers only fire when WE change something,
    # while the risk runs the other way: Kubernetes publishes new versions
    # (new entries in envtest-releases.yaml) while this repo sits still, and
    # a new kube-apiserver may reject our default flag set (flag drift, cf.
    # --insecure-port removed in 1.24). The weekly run bounds how long such
    # a break can exist before we notice, instead of a user noticing first.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # envtest-js honors XDG_DATA_HOME on every platform (setup-envtest compat),
  # which gives all three OSes the same cacheable binary path.
  XDG_DATA_HOME: ${{ github.workspace }}/.envtest-data

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24]
        include:
          # Newest major on one OS, until it graduates into the full matrix.
          - os: ubuntu-latest
            node: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Resolve latest envtest version (cache key)
        id: envtest
        shell: bash
        run: echo "version=$(node scripts/envtest-versions.mjs | tr -d '[]\"')" >> "$GITHUB_OUTPUT"
      - name: Cache envtest binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .envtest-data
          key: envtest-${{ runner.os }}-${{ steps.envtest.outputs.version }}
      - run: npm test

  bun:
    name: Bun tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - name: Resolve latest envtest version (cache key)
        id: envtest
        shell: bash
        run: echo "version=$(bun scripts/envtest-versions.mjs | tr -d '[]\"')" >> "$GITHUB_OUTPUT"
      - name: Cache envtest binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .envtest-data
          key: envtest-${{ runner.os }}-${{ steps.envtest.outputs.version }}
      - run: bun test --timeout 120000

  # Single stable check for branch protection. Matrix jobs surface as one
  # check per combination — and version-matrix's names change as upstream
  # releases — so requiring them individually would drift. Require only
  # this job.
  ci-ok:
    name: CI OK
    if: always()
    needs: [check, test, bun, resolve-versions, version-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # skipped counts as failure: a job skipped because its dependency
      # failed must not let the gate pass.
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1

  # Cuts a release from main once the full CI gate is green: semantic-release
  # derives the version from conventional commits, bumps package.json /
  # package-lock.json, commits that back ([skip ci]), tags, and publishes a
  # GitHub Release. Deliberately NOT publishing to npm yet (npmPublish: false
  # in .releaserc.json). The README shows the version via a release badge, so
  # it needs no sync.
  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci-ok]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No write permissions on GITHUB_TOKEN: semantic-release authenticates as
    # the release GitHub App instead, which is the ruleset bypass actor for
    # main (the default token can't push there — "changes through PR" rule).
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # semantic-release needs the full history and tags to find the
          # previous release and the commits since.
          fetch-depth: 0
          # Don't bake the default GITHUB_TOKEN into the git config: its
          # http.extraheader would override the app token in the push URL,
          # making the release push authenticate as github-actions[bot]
          # (read-only, and not the ruleset bypass actor).
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  resolve-versions:
    name: Resolve upstream versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      versions: ${{ steps.list.outputs.versions }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: List newest stable envtest versions
        id: list
        run: echo "versions=$(node scripts/envtest-versions.mjs 4)" >> "$GITHUB_OUTPUT"

  version-matrix:
    name: e2e against envtest ${{ matrix.version }}
    needs: resolve-versions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.resolve-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache envtest binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .envtest-data
          key: envtest-${{ runner.os }}-${{ matrix.version }}
      - name: e2e against pinned control plane
        env:
          ENVTEST_K8S_VERSION: ${{ matrix.version }}
        run: npx vitest run test/e2e.test.ts

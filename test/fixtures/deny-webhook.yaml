apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: envtest-deny-labeled
webhooks:
  - name: deny.envtest.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    objectSelector:
      matchLabels:
        envtest-webhook: deny
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["configmaps"]
    clientConfig:
      service:
        name: webhook-service
        namespace: default
        path: /validate-deny

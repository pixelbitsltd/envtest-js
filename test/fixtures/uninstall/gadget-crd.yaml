# Lives in a subdirectory so directory-based installs of fixtures/ (which
# read non-recursively) don't pick it up — the uninstall test owns it.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gadgets.uninstall.example.com
spec:
  group: uninstall.example.com
  names:
    plural: gadgets
    singular: gadget
    kind: Gadget
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                color:
                  type: string
